<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/aa8511d0f3.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css">
  <title>DualCode Solutions</title>
</head>

<body>

  <div class="contenedor">
    <!-- Logo y Titulo -->
    <div class="title">
      <img src="img/DevCode logo.png" alt="DualCode-Logo">
      <h1>DualCode Solutions</h1>
      <h3>Desarrollo Web</h3>
    </div>

    <!-- Contenedor de links -->
    <div class="container-links">
      <!-- Link 1 -->
      <div class="link-card">
        <a href="https://www.instagram.com/dualcode.ar/" target="_blank" class="main-link">
          <i class="fa-brands fa-instagram"></i>
          <p>Instagram</p>
        </a>
        <button class="btn-share"><i class="fa-solid fa-share"></i></button>
      </div>
      <!-- Link 2 -->
      <div class="link-card">
        <a href="https://www.dualcode.com.ar" target="_blank" class="main-link">
          <i class="fa-solid fa-globe"></i>
          <p>Sitio Web</p>
        </a>
        <button class="btn-share"><i class="fa-solid fa-share"></i></button>
      </div>
      <!-- Link 3 -->
      <div class="link-card">
        <a href="mailto:dualcodesolutions@gmail.com?subject=Cotizar Proyecto&body=Hola, me gustaría cotizar mi proyecto!"
          class="main-link">
          <i class="fa-solid fa-envelope"></i>
          <p>Cotizar Proyecto</p>
        </a>
        <button class="btn-share"><i class="fa-solid fa-share"></i></button>
      </div>
    </div>
  </div>
  </div>
  <footer>
    <p>
      &copy; 2026 <strong>DualCode Solutions</strong>.
      Todos los derechos reservados.
    </p>
  </footer>
</body>
</body>
<script src="app.js"></script>

</html>
